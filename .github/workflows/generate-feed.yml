name: Generate Google Merchant Feed

on:
  # Run daily at 4am UTC (5am UK time)
  schedule:
    - cron: '0 4 * * *'

  # Allow manual trigger from GitHub
  workflow_dispatch:

  # Also run on push to main (for initial setup)
  push:
    branches: [main]

# Permissions needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate feed
        env:
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
        run: node generate-feed.js

      - name: Verify feed was generated
        run: |
          if [ ! -f docs/feed.xml ]; then
            echo "❌ Feed file was not generated!"
            exit 1
          fi
          echo "✅ Feed file exists"
          echo "   Size: $(wc -c < docs/feed.xml) bytes"
          echo "   Products: $(grep -c '<item>' docs/feed.xml || echo 0)"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
